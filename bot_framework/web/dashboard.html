<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f23; --bg2: #1a1a2e; --bg3: #16213e; --border: #1a3a5c;
  --fg: #d4d4d4; --fg2: #888; --accent: #ffd700;
  --green: #4ec9b0; --red: #e94560; --yellow: #f0c040; --cyan: #569cd6; --purple: #c586c0;
}
body { font: 13px/1.5 'Cascadia Code','Consolas',monospace; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
button { font: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--fg); padding: 4px 12px; border-radius: 3px; }
button:hover { background: #1e3a5f; }
input, select { font: inherit; background: var(--bg2); color: var(--fg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 3px; }
input:focus, select:focus { outline: none; border-color: var(--accent); }

.header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header h1 { font-size: 16px; color: var(--accent); white-space: nowrap; }
.header .stats { font-size: 12px; color: var(--fg2); }
.header .stats b { color: var(--green); }
.header .actions { margin-left: auto; display: flex; gap: 6px; }

.main { display: flex; flex: 1; overflow: hidden; }
.account-list { width: 340px; overflow-y: auto; border-right: 1px solid var(--border); flex-shrink: 0; }
.detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.acc { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.acc:hover { background: var(--bg2); }
.acc.selected { background: var(--bg3); border-left: 3px solid var(--accent); }
.acc-header { display: flex; align-items: center; gap: 8px; }
.acc-email { font-weight: 600; font-size: 12px; color: var(--fg); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.acc-state { font-size: 10px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; font-weight: 600; }
.state-idle { background: #333; color: #888; }
.state-logging_in,.state-connecting,.state-authenticating { background: #3a3520; color: var(--yellow); }
.state-online { background: #1a3a2e; color: var(--green); }
.state-error { background: #3a1a1a; color: var(--red); }
.state-disconnected { background: #2a2020; color: #c88; }
.acc-info { font-size: 11px; color: var(--fg2); margin-top: 3px; }
.acc-info span { margin-right: 10px; }
.acc-actions { margin-top: 6px; display: flex; gap: 4px; }
.acc-actions button { font-size: 11px; padding: 2px 8px; }
.proxy-card { border-left: 3px solid var(--purple); }
.proxy-card .acc-email { color: var(--purple); }
.section-label { font-size: 10px; color: var(--fg2); padding: 8px 14px 4px; text-transform: uppercase; letter-spacing: 1px; }

.detail-header { padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.detail-header h2 { font-size: 14px; color: var(--accent); }
.detail-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.dtab { padding: 6px 16px; cursor: pointer; color: var(--fg2); border-bottom: 2px solid transparent; font-size: 12px; }
.dtab.active { color: var(--fg); border-color: var(--accent); }
.detail-body { flex: 1; overflow-y: auto; padding: 0; min-height: 0; }
.detail-body.padded { padding: 12px 16px; }

.info-grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; font-size: 12px; }
.info-grid .label { color: var(--fg2); }
.info-grid .value { color: var(--green); word-break: break-all; }

.log-entry { font-size: 11px; padding: 1px 8px; border-bottom: 1px solid #1a1a2e; }
.log-ts { color: var(--fg2); margin-right: 8px; }
.log-msg { color: var(--fg); }
.log-msg.err { color: var(--red); }

/* Packets */
.pkt { border-bottom: 1px solid var(--border); }
.pkt-head { padding: 3px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; }
.pkt-head:hover { background: var(--bg2); }
.pkt-dir { font-weight: bold; min-width: 28px; }
.pkt-dir.c2s { color: var(--yellow); }
.pkt-dir.s2c { color: var(--green); }
.pkt-name { color: var(--cyan); }
.pkt-src { color: var(--fg2); font-size: 10px; }
.pkt-size { color: var(--fg2); margin-left: auto; font-size: 11px; }
.pkt-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
.badge-drop { background: #552233; color: var(--red); }
.badge-mod { background: #553355; color: var(--purple); }
.pkt-body { display: none; padding: 4px 12px 8px 40px; }
.pkt-body pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; color: var(--fg2); max-height: 400px; overflow-y: auto; }
.pkt.open .pkt-body { display: block; }
.pkt-fields { font-size: 11px; }
.pkt-fields .pf-row { display: flex; gap: 6px; padding: 1px 0; }
.pkt-fields .pf-key { color: var(--cyan); min-width: 100px; }
.pkt-fields .pf-val { color: var(--fg); word-break: break-all; }
.pkt-fields .pf-sub { margin-left: 12px; border-left: 2px solid var(--border); padding-left: 8px; }
.pkt-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.pkt-toolbar input { width: 160px; padding: 3px 6px; font-size: 11px; }
.pkt-toolbar label { font-size: 11px; color: var(--fg2); display: flex; align-items: center; gap: 3px; }
.pkt-toolbar button { font-size: 11px; padding: 2px 8px; }
.pkt-count { font-size: 10px; color: var(--fg2); margin-left: auto; }

.no-selection { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--fg2); font-size: 14px; }

/* Form builder */
.fb { font-size: 12px; }
.fb-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.fb-label { min-width: 110px; color: var(--cyan); text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
.fb-type { color: var(--fg2); font-size: 10px; min-width: 40px; }
.fb-input { flex: 1; min-width: 0; }
.fb-input input, .fb-input select { width: 100%; padding: 3px 6px; }
.fb-input input[type=checkbox] { width: auto; }
.fb-sub { margin-left: 12px; border-left: 2px solid var(--border); padding-left: 8px; }
.fb-sub-header { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; color: var(--cyan); font-size: 12px; }
.fb-sub-header:hover { color: var(--fg); }
.fb-sub-body { display: none; }
.fb-sub.open .fb-sub-body { display: block; }
.fb-repeat-items { margin-left: 12px; border-left: 2px solid var(--border); padding-left: 8px; }
.fb-repeat-item { position: relative; margin-bottom: 4px; padding: 2px 0; border-bottom: 1px dotted var(--border); }
.fb-repeat-item .fb-item-del { position: absolute; right: 0; top: 0; color: var(--red); cursor: pointer; background: none; border: none; font-size: 11px; }
.fb-add { font-size: 11px; padding: 2px 8px; margin: 2px 0 2px 12px; }
.fb-actions { margin-top: 10px; display: flex; gap: 8px; }
.fb-json-toggle { font-size: 11px; color: var(--fg2); cursor: pointer; margin-left: auto; }
.fb-json-toggle:hover { color: var(--fg); }
.fb-json textarea { width: 100%; height: 120px; resize: vertical; font: inherit; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 3px; padding: 6px; }
.send-panel .field { margin-bottom: 8px; }
.send-panel .field label { display: block; font-size: 11px; color: var(--fg2); margin-bottom: 2px; }
.send-panel .field input, .send-panel .field select { width: 100%; }

/* Rules */
.rule { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.rule-pkt { color: var(--cyan); flex: 1; }
.rule-action { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
.rule-action.drop { background: #552233; color: var(--red); }
.rule-action.modify { background: #553355; color: var(--purple); }
.rule-dir { color: var(--fg2); font-size: 10px; }
.rule-del { color: var(--red); cursor: pointer; background: none; border: none; padding: 2px 4px; font: inherit; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 400px; }
.modal h3 { color: var(--accent); margin-bottom: 12px; }
.modal .field { margin-bottom: 10px; }
.modal .field label { display: block; font-size: 12px; color: var(--fg2); margin-bottom: 3px; }
.modal .field input { width: 100%; }
.modal .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.modal .btns .primary { background: var(--accent); color: #000; font-weight: 600; }

/* Actions tab */
.action-section { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.action-section h3 { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
.action-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.action-row label { font-size: 12px; color: var(--fg); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.action-row label input[type=checkbox] { accent-color: var(--accent); }

/* Heroes / Formation tab */
.formation-container { display: flex; gap: 24px; flex-wrap: wrap; }
.formation-panel { flex: 1; min-width: 200px; }
.formation-panel h4 { font-size: 12px; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.formation-grid { display: grid; grid-template-columns: repeat(3, 64px); grid-template-rows: repeat(3, 52px); gap: 4px; }
.grid-cell { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; position: relative; }
.grid-cell.occupied { border-color: var(--cyan); background: #0d1b2a; }
.grid-cell.enemy { border-color: var(--red); background: #1a0d0d; }
.grid-cell .cell-name { font-weight: 600; color: var(--fg); font-size: 9px; text-align: center; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 58px; }
.grid-cell .cell-info { color: var(--fg2); font-size: 8px; }
.grid-cell .cell-post { position: absolute; top: 1px; right: 3px; font-size: 8px; font-weight: 600; }
.grid-row-label { font-size: 9px; color: var(--fg2); text-align: center; margin-bottom: 2px; }
.hero-roster { margin-top: 12px; }
.hero-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; font-size: 11px; border-bottom: 1px solid var(--border); }
.hero-row.in-team { background: #0d1b2a; }
.hero-row .hero-name { flex: 1; font-weight: 600; }
.hero-row .hero-star { color: var(--yellow); }
.hero-row .hero-lv { color: var(--green); }
.hero-row .hero-fp { color: var(--cyan); font-size: 10px; }
.hero-row .hero-cost { color: var(--fg2); font-size: 10px; }
.hero-row .hero-cost.cant-afford { color: var(--red); }
.post-badge { display: inline-block; padding: 0 4px; border-radius: 2px; font-size: 9px; font-weight: 600; }
.post-1 { background: #2a3f2a; color: #8fbc8f; } /* Guardian */
.post-2 { background: #2a2a3f; color: #8f8fbc; } /* Support */
.post-3 { background: #3f2a2a; color: #bc8f8f; } /* Assassin */
.post-4 { background: #3f3a2a; color: #bcb08f; } /* Warrior */
.post-5 { background: #2a3f3f; color: #8fbcbc; } /* Archer */
.post-6 { background: #3f2a3f; color: #bc8fbc; } /* Mage */
.currency-bar { display: flex; gap: 16px; font-size: 11px; padding: 6px 10px; background: var(--bg2); border-radius: 4px; margin-bottom: 10px; }
.currency-bar span { color: var(--fg2); }
.currency-bar b { color: var(--fg); }
</style>
</head>
<body>
<div class="header">
  <h1>DragonTraveler Dashboard</h1>
  <span class="stats" id="stats">0 accounts | <b>0</b> online</span>
  <div class="actions">
    <button onclick="showRegisterModal()">Register</button>
    <button onclick="showAddModal()">+ Add</button>
    <button onclick="showBulkModal()">Load File</button>
    <button onclick="api('POST','/api/start-all')">Start All</button>
    <button onclick="api('POST','/api/stop-all')" style="color:var(--red)">Stop All</button>
  </div>
</div>
<div class="main">
  <div class="account-list" id="accountList"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="no-selection" id="noSelection">Select an account or proxy</div>
    <div id="detailContent" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="detail-header"><h2 id="detailTitle"></h2></div>
      <div class="detail-tabs" id="detailTabs"></div>
      <div id="detailToolbar"></div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="addModal"><div class="modal">
  <h3>Add Account</h3>
  <div class="field"><label>Email</label><input type="email" id="addEmail"></div>
  <div class="field"><label>Password</label><input type="password" id="addPass"></div>
  <div class="field"><label>Server ID (optional)</label><input type="text" id="addServer" placeholder="auto (last played)"></div>
  <div class="btns"><button onclick="hideModals()">Cancel</button><button class="primary" onclick="doAddAccount()">Add</button></div>
</div></div>
<div class="modal-overlay" id="bulkModal"><div class="modal">
  <h3>Load Accounts from File</h3>
  <div class="field"><label>File path</label><input type="text" id="bulkPath" placeholder="d:\tmp\framework\accounts.txt"></div>
  <p style="font-size:11px;color:var(--fg2);margin-top:6px">Format: email:password[:serverId] per line</p>
  <div class="btns"><button onclick="hideModals()">Cancel</button><button class="primary" onclick="doLoadFile()">Load</button></div>
</div></div>
<div class="modal-overlay" id="registerModal"><div class="modal" style="width:500px">
  <h3>Register Accounts</h3>
  <div class="field"><label>Count (1-20)</label><input type="number" id="regCount" value="1" min="1" max="20"></div>
  <div class="field"><label>Server ID (optional)</label><input type="text" id="regServer" placeholder="auto (Venus 2)"></div>
  <div id="regProgress" style="display:none;margin-top:12px">
    <div style="font-size:11px;color:var(--fg2);margin-bottom:4px">Progress:</div>
    <div id="regLog" style="max-height:200px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:6px;font-size:11px;color:var(--fg2)"></div>
  </div>
  <div class="btns" id="regBtns"><button onclick="hideModals()">Cancel</button><button class="primary" onclick="doRegister()">Create</button></div>
</div></div>
<datalist id="msgNames"></datalist>

<script>
const API = location.origin;
let ws = null, accounts = {}, selectedId = null, currentTab = 'info', logCache = {};
let hasProxy = false, proxySession = false;
let proxyPackets = [], botPackets = {};
const MAX_PKTS = 500;
let pktPaused = false, pktFilter = '', pktShowC2S = true, pktShowS2C = true;
let recording = false, recordBuffer = [], recordStart = 0;

// Schema cache for form builder
let currentSchema = null, currentSubs = {}, currentEnums = {};
let jsonMode = false, messages = [];

// ── Init ──────────────────────────────────────────────────────────────────

(async function init() {
  try {
    messages = await (await fetch(API + '/api/messages')).json();
    document.getElementById('msgNames').innerHTML = messages.map(m => '<option value="' + esc(m.name) + '">').join('');
  } catch {}
  connectWS();
  fetchStatus();
  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if (e.target === m) hideModals(); }));
})();

// ── WebSocket ──────────────────────────────────────────────────────────────

function connectWS() {
  ws = new WebSocket('ws://' + location.host);
  ws.onclose = () => setTimeout(connectWS, 2000);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'init': case 'status':
        for (const a of msg.accounts || []) accounts[a.id] = a;
        hasProxy = !!msg.proxy; proxySession = !!msg.proxySession;
        renderList(); updateStats(msg);
        if (selectedId && selectedId !== 'proxy' && accounts[selectedId] && currentTab !== 'send' && currentTab !== 'actions') renderDetail();
        break;
      case 'state':
        if (accounts[msg.account]) { accounts[msg.account].state = msg.state; accounts[msg.account].error = null; renderList(); if (selectedId === msg.account && currentTab !== 'send' && currentTab !== 'actions') renderDetail(); }
        break;
      case 'log':
        if (!logCache[msg.account]) logCache[msg.account] = [];
        logCache[msg.account].push({ ts: msg.ts, msg: msg.msg });
        if (logCache[msg.account].length > 500) logCache[msg.account].shift();
        if (selectedId === msg.account && currentTab === 'logs') appendLogEntry(msg);
        break;
      case 'added': fetchStatus(); break;
      case 'removed':
        delete accounts[msg.id]; delete logCache[msg.id]; delete botPackets[msg.id];
        if (selectedId === msg.id) selectedId = null;
        renderList(); renderDetail(); break;
      case 'mining':
        const mf = document.getElementById('miningFloor');
        if (mf) mf.textContent = msg.floor || '?';
        const ms = document.getElementById('miningShovels');
        if (ms) ms.textContent = msg.inv?.shovels ?? '?';
        const mb = document.getElementById('miningBombs');
        if (mb) mb.textContent = msg.inv?.bombs ?? '?';
        const mr = document.getElementById('miningRockets');
        if (mr) mr.textContent = msg.inv?.rockets ?? '?';
        renderMiningGrid(msg.grids, msg.judgGrids, msg.action !== 'init' && msg.action !== 'done' ? { x: msg.x, y: msg.y } : null);
        if (msg.action === 'dig') addMiningLog('⛏ Dig (' + msg.x + ',' + msg.y + ') cost=' + msg.cost + ' → floor ' + msg.floor);
        else if (msg.action === 'bomb') addMiningLog('💣 Bomb (' + msg.x + ',' + msg.y + ') → floor ' + msg.floor);
        else if (msg.action === 'rocket') addMiningLog('🚀 Rocket row ' + msg.y + ' → floor ' + msg.floor);
        else if (msg.action === 'done') { addMiningLog('✅ Done! Floor ' + msg.floor); miningRunning = false; const btn = document.getElementById('miningBtn'); if (btn) { btn.textContent = 'Start Mining'; btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; } }
        if (msg.mapStats) {
          const me = document.getElementById('mapExplored'); if (me) me.textContent = msg.mapStats.columnsKnown;
          const mm = document.getElementById('mapMaxFloor'); if (mm) mm.textContent = msg.mapStats.maxFloor;
          const mc = document.getElementById('mapContributors'); if (mc) mc.textContent = (msg.mapStats.contributors||[]).length;
        }
        break;
      case 'pkt': handlePacket(msg); break;
      case 'pkt_batch': for (const p of msg.packets || []) handlePacket(p); break;
      case 'proxy_session': proxySession = msg.type2 !== 'close'; renderList(); if (selectedId === 'proxy' && currentTab !== 'inject') renderDetail(); break;
      case 'reload':
        console.log('[hot] Server file changed:', msg.fileType + '/' + msg.filename, 'v' + msg.version);
        if (msg.fileType === 'web') {
          // Brief delay so the file write finishes
          setTimeout(() => location.reload(), 300);
        }
        break;
    }
  };
}

function handlePacket(pkt) {
  if (recording) {
    recordBuffer.push({
      t: (pkt.ts || Date.now()) - recordStart,
      dir: pkt.direction || 'S2C',
      name: pkt.name || null,
      msgId: pkt.msgId || 0,
      data: pkt.data || null,
      size: pkt.size || 0,
      source: pkt.source,
    });
  }
  if (pkt.source === 'proxy') {
    proxyPackets.push(pkt); if (proxyPackets.length > MAX_PKTS) proxyPackets.shift();
    if (selectedId === 'proxy' && currentTab === 'packets') appendPkt(pkt);
  } else if (pkt.source === 'bot' && pkt.account) {
    if (!botPackets[pkt.account]) botPackets[pkt.account] = [];
    botPackets[pkt.account].push(pkt); if (botPackets[pkt.account].length > MAX_PKTS) botPackets[pkt.account].shift();
    if (selectedId === pkt.account && currentTab === 'packets') appendPkt(pkt);
  }
}

async function fetchStatus() {
  const data = await (await fetch(API + '/api/status')).json();
  for (const a of data.accounts) accounts[a.id] = a;
  hasProxy = !!data.proxy; proxySession = !!data.proxySession;
  renderList(); updateStats(data);
}

function updateStats(d) {
  document.getElementById('stats').innerHTML =
    `${d.total} accounts | <b>${d.online}</b> online` +
    (d.error > 0 ? ` | <span style="color:var(--red)">${d.error} errors</span>` : '') +
    (hasProxy ? ` | <span style="color:var(--purple)">MITM ${proxySession ? 'active' : 'idle'}</span>` : '');
}

// ── Account List ─────────────────────────────────────────────────────────

function renderList() {
  const el = document.getElementById('accountList');
  let h = '';
  if (hasProxy) {
    const sel = selectedId === 'proxy' ? 'selected' : '';
    const sc = proxySession ? 'state-online' : 'state-idle';
    h += '<div class="section-label">MITM Proxy</div>';
    h += `<div class="acc proxy-card ${sel}" onclick="selectProxy()">
      <div class="acc-header"><span class="acc-email">MITM Proxy Session</span><span class="acc-state ${sc}">${proxySession ? 'ACTIVE' : 'IDLE'}</span></div>
      <div class="acc-info"><span>${proxyPackets.length} packets</span></div></div>`;
  }
  const ids = Object.keys(accounts).map(Number).sort((a, b) => a - b);
  if (ids.length > 0) h += '<div class="section-label">Bot Accounts</div>';
  for (const id of ids) {
    const a = accounts[id], sel = id === selectedId ? 'selected' : '', sc = 'state-' + (a.state || 'idle');
    let info = '';
    if (a.roleName) info += `<span>${esc(a.roleName)} Lv${a.roleLevel}</span>`;
    if (a.serverName) info += `<span>${esc(a.serverName)}</span>`;
    if (a.state === 'online' && a.uptime > 0) info += `<span>${formatUptime(a.uptime)}</span>`;
    if (a.error) info = `<span style="color:var(--red)">${esc(a.error.substring(0, 60))}</span>`;
    if (a.autoPlay?.running) info += `<span style="color:var(--green)">AUTO ${a.autoPlay.stats?.wins||0}W/${a.autoPlay.stats?.losses||0}L</span>`;
    h += `<div class="acc ${sel}" onclick="selectAccount(${id})">
      <div class="acc-header"><span class="acc-email">${esc(a.email)}</span><span class="acc-state ${sc}">${a.state || 'idle'}</span></div>
      ${info ? '<div class="acc-info">' + info + '</div>' : ''}
      <div class="acc-actions">
        <button onclick="event.stopPropagation();api('POST','/api/accounts/${id}/start')">Start</button>
        <button onclick="event.stopPropagation();api('POST','/api/accounts/${id}/start-bot')" style="color:var(--green,#4ec9b0)">Start+Bot</button>
        <button onclick="event.stopPropagation();api('POST','/api/accounts/${id}/stop')" style="color:var(--red)">Stop</button>
        <button onclick="event.stopPropagation();removeAccount(${id})" style="color:var(--fg2)">Remove</button>
      </div></div>`;
  }
  if (!h) h = '<div style="padding:20px;color:var(--fg2);text-align:center">No accounts loaded</div>';
  el.innerHTML = h;
}

function selectProxy() { selectedId = 'proxy'; currentTab = 'packets'; renderList(); renderDetail(); }
function selectAccount(id) { selectedId = id; currentTab = 'info'; heroTabData = null; renderList(); renderDetail(); if (!logCache[id]) loadLogs(id); }
async function loadLogs(id) { logCache[id] = await (await fetch(API + '/api/accounts/' + id + '/logs?limit=200')).json(); if (selectedId === id && currentTab === 'logs') renderDetail(); }

// ── Detail Panel ─────────────────────────────────────────────────────────

function renderDetail() {
  const noSel = document.getElementById('noSelection'), content = document.getElementById('detailContent');
  if (selectedId === null || (selectedId !== 'proxy' && !accounts[selectedId])) { noSel.style.display = 'flex'; content.style.display = 'none'; return; }
  noSel.style.display = 'none'; content.style.display = 'flex';
  selectedId === 'proxy' ? renderProxyDetail() : renderBotDetail();
}

function renderBotDetail() {
  const a = accounts[selectedId];
  document.getElementById('detailTitle').textContent = a.email;
  const tabs = ['info', 'heroes', 'logs', 'packets', 'send', 'actions'];
  document.getElementById('detailTabs').innerHTML = tabs.map(t => `<div class="dtab ${currentTab === t ? 'active' : ''}" onclick="currentTab='${t}';renderDetail()">${t[0].toUpperCase() + t.slice(1)}</div>`).join('');
  const toolbar = document.getElementById('detailToolbar'), body = document.getElementById('detailBody');

  if (currentTab === 'packets') { renderPacketToolbar(toolbar); body.className = 'detail-body'; renderPacketLog(body, botPackets[selectedId] || []); return; }
  toolbar.innerHTML = ''; body.className = 'detail-body padded';

  if (currentTab === 'info') {
    body.innerHTML = `<div class="info-grid">
      <span class="label">State</span><span class="value">${a.state}</span>
      <span class="label">Email</span><span class="value">${esc(a.email)}</span>
      <span class="label">UID (accid)</span><span class="value">${a.uid || '\u2014'}</span>
      <span class="label">Role</span><span class="value">${a.roleName ? esc(a.roleName) + ' Lv' + a.roleLevel : '\u2014'}</span>
      <span class="label">RID</span><span class="value">${a.roleRid || '\u2014'}</span>
      <span class="label">Server</span><span class="value">
        ${a.serverName || '\u2014'} ${a.serverAddr ? '(' + a.serverAddr + ')' : ''}
        <button onclick="showServerPicker(${a.id})" style="margin-left:8px;font-size:11px;padding:1px 6px">Change</button>
      </span>
      <span class="label">Server ID</span><span class="value">${a.serverId || '\u2014'}</span>
      <span class="label">Ping Count</span><span class="value">${a.pingCount}</span>
      <span class="label">Last Pong</span><span class="value">${a.lastPong ? new Date(a.lastPong).toLocaleTimeString() : '\u2014'}</span>
      <span class="label">Uptime</span><span class="value">${a.connectedAt ? formatUptime(a.uptime) : '\u2014'}</span>
      <span class="label">Error</span><span class="value" style="color:var(--red)">${a.error || '\u2014'}</span></div>
    <div id="serverPicker"></div>`;
  } else if (currentTab === 'logs') {
    body.innerHTML = (logCache[selectedId] || []).map(l => `<div class="log-entry"><span class="log-ts">${new Date(l.ts).toLocaleTimeString()}</span><span class="log-msg${l.msg.includes('ERROR') ? ' err' : ''}">${esc(l.msg)}</span></div>`).join('');
    body.scrollTop = body.scrollHeight;
  } else if (currentTab === 'send') {
    renderSendForm(body, 'bot');
  } else if (currentTab === 'heroes') {
    renderHeroesTab(body, a);
  } else if (currentTab === 'actions') {
    renderActionsTab(body, a);
  }
}

function renderProxyDetail() {
  document.getElementById('detailTitle').textContent = 'MITM Proxy';
  const tabs = ['packets', 'rules', 'inject', 'target'];
  document.getElementById('detailTabs').innerHTML = tabs.map(t => `<div class="dtab ${currentTab === t ? 'active' : ''}" onclick="currentTab='${t}';renderDetail()">${t[0].toUpperCase() + t.slice(1)}</div>`).join('');
  const toolbar = document.getElementById('detailToolbar'), body = document.getElementById('detailBody');

  if (currentTab === 'target') { toolbar.innerHTML = ''; body.className = 'detail-body padded'; renderProxyTarget(body); return; }
  if (currentTab === 'packets') { renderPacketToolbar(toolbar); body.className = 'detail-body'; renderPacketLog(body, proxyPackets); }
  else if (currentTab === 'rules') { toolbar.innerHTML = ''; body.className = 'detail-body padded'; renderRules(body); }
  else if (currentTab === 'inject') { toolbar.innerHTML = ''; body.className = 'detail-body padded'; renderSendForm(body, 'proxy'); }
}

// ── Packet log ───────────────────────────────────────────────────────────

function renderPacketToolbar(el) {
  el.innerHTML = `<div class="pkt-toolbar">
    <input type="text" id="pktFilter" placeholder="Filter..." value="${esc(pktFilter)}" oninput="pktFilter=this.value;renderDetail()">
    <label><input type="checkbox" ${pktShowC2S ? 'checked' : ''} onchange="pktShowC2S=this.checked;renderDetail()"> C2S</label>
    <label><input type="checkbox" ${pktShowS2C ? 'checked' : ''} onchange="pktShowS2C=this.checked;renderDetail()"> S2C</label>
    <button onclick="pktPaused=!pktPaused;this.textContent=pktPaused?'Resume':'Pause'">${pktPaused ? 'Resume' : 'Pause'}</button>
    <button onclick="clearPkts()">Clear</button>
    <button onclick="toggleRecord()" style="color:${recording ? 'var(--red)' : 'inherit'}">${recording ? '\u23F9 Stop' : '\u23FA Record'}</button>
    ${recordBuffer.length > 0 ? `<button onclick="exportRecording()">Export (${recordBuffer.length})</button>` : ''}
    <span class="pkt-count" id="pktCount"></span></div>`;
}

function renderPacketLog(body, pkts) {
  const f = filterPkts(pkts);
  const c = document.getElementById('pktCount');
  if (c) c.textContent = f.length + ' / ' + pkts.length;
  body.innerHTML = f.map(pktHtml).join('');
  body.scrollTop = body.scrollHeight;
}

function appendPkt(pkt) {
  if (pktPaused || !matchesPktFilter(pkt)) return;
  const body = document.getElementById('detailBody');
  if (!body || currentTab !== 'packets') return;
  const d = document.createElement('div'); d.innerHTML = pktHtml(pkt);
  body.appendChild(d.firstElementChild);
  if (body.scrollHeight - body.scrollTop - body.clientHeight < 80) body.scrollTop = body.scrollHeight;
  while (body.children.length > 1000) body.removeChild(body.firstChild);
}

function pktHtml(p) {
  const dir = p.direction || 'S2C', arrow = dir === 'C2S' ? 'C\u2192S' : 'S\u2192C', dc = dir === 'C2S' ? 'c2s' : 's2c';
  const name = p.name || ('0x' + (p.msgId || 0).toString(16));
  let badges = '';
  if (p.dropped) badges += '<span class="pkt-badge badge-drop">DROP</span>';
  if (p.modified) badges += '<span class="pkt-badge badge-mod">MOD</span>';
  const src = p.source === 'bot' && p.accountEmail ? `<span class="pkt-src">[${esc(p.accountEmail.split('@')[0])}]</span>` : '';
  const fieldsHtml = p.data && typeof p.data === 'object' ? renderFields(p.data) : '<pre>' + esc(JSON.stringify(p.data, null, 2)) + '</pre>';
  return `<div class="pkt" onclick="this.classList.toggle('open')">
    <div class="pkt-head"><span class="pkt-dir ${dc}">${arrow}</span><span class="pkt-name">${esc(name)}</span>${badges}${src}<span class="pkt-size">${p.size || 0}B</span></div>
    <div class="pkt-body">${fieldsHtml}</div></div>`;
}

function renderFields(obj, depth) {
  if (!obj || typeof obj !== 'object') return '<pre>' + esc(String(obj)) + '</pre>';
  depth = depth || 0;
  if (depth > 4) return '<pre>' + esc(JSON.stringify(obj)) + '</pre>';
  let h = '<div class="pkt-fields">';
  for (const [k, v] of Object.entries(obj)) {
    if (v && typeof v === 'object' && !Array.isArray(v)) {
      h += `<div class="pf-row"><span class="pf-key">${esc(k)}:</span></div><div class="pf-sub">${renderFields(v, depth + 1)}</div>`;
    } else if (Array.isArray(v)) {
      h += `<div class="pf-row"><span class="pf-key">${esc(k)}:</span><span class="pf-val">[${v.length} items]</span></div>`;
      if (v.length <= 20) {
        h += '<div class="pf-sub">';
        for (let i = 0; i < v.length; i++) {
          const item = v[i];
          if (item && typeof item === 'object') {
            h += `<div class="pf-row"><span class="pf-key">[${i}]</span></div><div class="pf-sub">${renderFields(item, depth + 1)}</div>`;
          } else {
            h += `<div class="pf-row"><span class="pf-key">[${i}]</span><span class="pf-val">${esc(String(item))}</span></div>`;
          }
        }
        h += '</div>';
      }
    } else {
      const vs = typeof v === 'string' && v.startsWith('0x') && v.length > 20 ? v.substring(0, 24) + '...' : String(v);
      h += `<div class="pf-row"><span class="pf-key">${esc(k)}</span><span class="pf-val">${esc(vs)}</span></div>`;
    }
  }
  return h + '</div>';
}

function filterPkts(p) { return p.filter(matchesPktFilter); }
function matchesPktFilter(p) {
  const dir = p.direction || 'S2C';
  if (dir === 'C2S' && !pktShowC2S) return false;
  if (dir === 'S2C' && !pktShowS2C) return false;
  if (pktFilter && !(p.name || '').toLowerCase().includes(pktFilter.toLowerCase())) return false;
  return true;
}
function clearPkts() { if (selectedId === 'proxy') proxyPackets = []; else if (selectedId && botPackets[selectedId]) botPackets[selectedId] = []; renderDetail(); }

function toggleRecord() {
  if (recording) {
    recording = false;
  } else {
    recordBuffer = [];
    recordStart = Date.now();
    recording = true;
  }
  renderDetail();
}

function exportRecording() {
  const session = {
    recorded: new Date().toISOString(),
    duration: recordBuffer.length > 0 ? recordBuffer[recordBuffer.length - 1].t : 0,
    packetCount: recordBuffer.length,
    c2s: recordBuffer.filter(p => p.dir === 'C2S').length,
    s2c: recordBuffer.filter(p => p.dir === 'S2C').length,
    packets: recordBuffer,
  };
  const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `session_${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Schema-aware send/inject form ────────────────────────────────────────

function renderSendForm(body, mode) {
  const isProxy = mode === 'proxy';
  const dirRow = isProxy ? `<div class="field"><label>Direction</label>
    <select id="sfDir"><option value="C2S">C2S (to server)</option><option value="S2C">S2C (to client)</option></select></div>` : '';
  body.innerHTML = `<div class="send-panel" style="padding:12px 16px">
    ${dirRow}
    <div class="field"><label>Message</label><input type="text" id="sfName" list="msgNames" placeholder="CSPing" oninput="onSfMsgSelect()"></div>
    <div style="display:flex;align-items:center;margin:6px 0">
      <b style="font-size:12px">Fields</b>
      <span class="fb-json-toggle" onclick="toggleSfJson()">[toggle JSON]</span>
    </div>
    <div id="sfFormFields" class="fb"></div>
    <div id="sfJsonMode" style="display:none"><textarea id="sfJsonData" class="fb-json" placeholder='{"field":"value"}'>{}</textarea></div>
    <div class="fb-actions">
      ${isProxy ? '<button onclick="doSfSend(\'proxy\')">Inject</button>'
        : '<button onclick="doSfSend(\'bot\')">Send to This</button><button onclick="doSfSend(\'all\')">Send to All</button><button onclick="doClaimDailyAll()" style="background:#1a3a1a;border-color:var(--green,#4ec9b0);color:var(--green,#4ec9b0)">Claim All Tasks</button>'}
      <button onclick="previewSfJson()" style="background:var(--bg2)">Preview</button>
    </div>
    <pre id="sfResult" style="font-size:11px;color:var(--fg2);margin-top:8px"></pre>
  </div>`;
}

let sfSchemaTimeout = null;
function onSfMsgSelect() {
  clearTimeout(sfSchemaTimeout);
  sfSchemaTimeout = setTimeout(loadSfSchema, 200);
  const name = document.getElementById('sfName').value.trim();
  const dirEl = document.getElementById('sfDir');
  if (dirEl) {
    if (name.startsWith('CS')) dirEl.value = 'C2S';
    else if (name.startsWith('SC')) dirEl.value = 'S2C';
  }
}

async function loadSfSchema() {
  const name = document.getElementById('sfName').value.trim();
  const container = document.getElementById('sfFormFields');
  if (!name) { container.innerHTML = ''; currentSchema = null; return; }
  try {
    const data = await (await fetch(API + '/api/schema?name=' + encodeURIComponent(name))).json();
    if (data.error) { container.innerHTML = '<span style="color:var(--fg2)">Unknown message</span>'; currentSchema = null; return; }
    currentSchema = data.schema; currentSubs = data.subs || {}; currentEnums = data.enums || {};
    container.innerHTML = '';
    buildFields(data.schema.fields, container);
  } catch { container.innerHTML = '<span style="color:var(--red)">Error loading schema</span>'; }
}

function toggleSfJson() {
  jsonMode = !jsonMode;
  document.getElementById('sfFormFields').style.display = jsonMode ? 'none' : 'block';
  document.getElementById('sfJsonMode').style.display = jsonMode ? 'block' : 'none';
}

function previewSfJson() {
  const data = getSfData();
  document.getElementById('sfResult').textContent = data !== null ? JSON.stringify(data, null, 2) : 'Invalid JSON';
}

function getSfData() {
  if (jsonMode) { try { return JSON.parse(document.getElementById('sfJsonData').value); } catch { return null; } }
  return collectFields(document.getElementById('sfFormFields'));
}

async function doSfSend(mode) {
  const name = document.getElementById('sfName').value.trim();
  if (!name) return;
  const data = getSfData();
  if (data === null) { document.getElementById('sfResult').textContent = 'Invalid JSON'; return; }
  let res;
  if (mode === 'proxy') {
    const dir = document.getElementById('sfDir').value;
    res = await api('POST', '/api/proxy/inject', { direction: dir, name, data });
  } else if (mode === 'all') {
    res = await api('POST', '/api/send-all', { name, data });
  } else {
    res = await api('POST', '/api/send', { id: selectedId, name, data });
  }
  document.getElementById('sfResult').textContent = res.error ? 'Error: ' + res.error : 'Sent!';
}

async function doClaimDailyAll() {
  const el = document.getElementById('sfResult');
  el.textContent = 'Claiming daily/weekly/lifetime tasks for all online accounts...';
  const res = await api('POST', '/api/claim-daily-all', {});
  if (res.error) { el.textContent = 'Error: ' + res.error; return; }
  const lines = (res.results || []).map(r =>
    `${r.email || r.id}: sent ${r.types || 0}/3 task-type claims`
  );
  el.textContent = lines.length ? lines.join('\n') : 'No online accounts';
}

// ── Form builder (ported from proxy panel) ───────────────────────────────

function buildFields(fields, container) {
  for (const f of fields) {
    const div = document.createElement('div');
    div.className = 'fb-field'; div.dataset.name = f.name; div.dataset.type = f.t;
    div.dataset.repeated = f.r ? '1' : '0';
    if (f.sub) div.dataset.sub = f.sub;

    if (f.r) {
      div.innerHTML = `<div class="fb-row"><span class="fb-label">${esc(f.name)}</span><span class="fb-type">${esc(f.t)}[]</span></div>`;
      const items = document.createElement('div'); items.className = 'fb-repeat-items'; div.appendChild(items);
      const btn = document.createElement('button'); btn.className = 'fb-add'; btn.textContent = '+ add';
      btn.onclick = () => addRepeatItem(items, f); div.appendChild(btn);
    } else if (f.t === 'message' && f.sub && currentSubs[f.sub]) {
      div.className = 'fb-field fb-sub';
      div.innerHTML = `<div class="fb-sub-header" onclick="this.parentElement.classList.toggle('open')">\u25b6 ${esc(f.name)} <span class="fb-type">${esc(f.sub)}</span></div>`;
      const b = document.createElement('div'); b.className = 'fb-sub-body';
      buildFields(currentSubs[f.sub].fields, b); div.appendChild(b);
    } else {
      div.innerHTML = `<div class="fb-row"><span class="fb-label" title="${esc(f.name)}">${esc(f.name)}</span><div class="fb-input">${inputFor(f)}</div><span class="fb-type">${esc(f.t)}</span></div>`;
    }
    container.appendChild(div);
  }
}

function inputFor(f) {
  if (f.t === 'bool') return '<input type="checkbox">';
  if (f.t === 'int32' || f.t === 'int64') return '<input type="number" placeholder="0">';
  if (f.t === 'double' || f.t === 'float') return '<input type="number" step="any" placeholder="0.0">';
  if (f.t === 'string') return '<input type="text" placeholder="">';
  if (f.t === 'bytes') return '<input type="text" placeholder="hex">';
  if (f.t === 'enum' && f.sub && currentEnums[f.sub]) {
    const entries = Object.entries(currentEnums[f.sub]).sort((a, b) => a[1] - b[1]);
    return '<select><option value="">(none)</option>' + entries.map(([n, v]) => `<option value="${v}">${esc(n)} (${v})</option>`).join('') + '</select>';
  }
  if (f.t === 'enum') return '<input type="number" placeholder="enum">';
  if (f.t === 'message') return `<input type="text" placeholder="JSON for ${esc(f.sub || 'msg')}">`;
  return '<input type="text">';
}

function addRepeatItem(container, f) {
  const item = document.createElement('div'); item.className = 'fb-repeat-item';
  const idx = container.children.length;
  const del = '<button class="fb-item-del" onclick="this.parentElement.remove()">\u00d7</button>';
  if (f.t === 'message' && f.sub && currentSubs[f.sub]) {
    item.innerHTML = `<div style="font-size:11px;color:var(--fg2)">[${idx}]</div>${del}`;
    const sb = document.createElement('div'); sb.className = 'fb-sub-body'; sb.style.display = 'block';
    buildFields(currentSubs[f.sub].fields, sb); item.appendChild(sb);
  } else {
    item.innerHTML = `<div class="fb-row"><span class="fb-label">[${idx}]</span><div class="fb-input">${inputFor(f)}</div></div>${del}`;
  }
  container.appendChild(item);
}

function collectFields(container) {
  const obj = {};
  for (const field of container.querySelectorAll(':scope > .fb-field')) {
    const name = field.dataset.name, type = field.dataset.type, repeated = field.dataset.repeated === '1', sub = field.dataset.sub;
    if (repeated) {
      const items = field.querySelector('.fb-repeat-items');
      if (!items || items.children.length === 0) continue;
      const arr = [];
      for (const item of items.children) {
        if (type === 'message' && sub && currentSubs[sub]) {
          const sb = item.querySelector('.fb-sub-body');
          if (sb) { const v = collectFields(sb); if (Object.keys(v).length > 0) arr.push(v); }
        } else { const v = readInput(item.querySelector('input,select'), type); if (v !== undefined) arr.push(v); }
      }
      if (arr.length > 0) obj[name] = arr;
    } else if (type === 'message' && sub && currentSubs[sub]) {
      const sb = field.querySelector('.fb-sub-body');
      if (sb) { const v = collectFields(sb); if (Object.keys(v).length > 0) obj[name] = v; }
    } else if (type === 'message') {
      const inp = field.querySelector('input');
      if (inp && inp.value.trim()) try { obj[name] = JSON.parse(inp.value); } catch {}
    } else {
      const v = readInput(field.querySelector('input,select'), type);
      if (v !== undefined) obj[name] = v;
    }
  }
  return obj;
}

function readInput(el, type) {
  if (!el) return undefined;
  if (type === 'bool') return el.checked ? true : undefined;
  if (type === 'int32' || type === 'int64' || type === 'enum') return el.value !== '' ? parseInt(el.value) : undefined;
  if (type === 'double' || type === 'float') return el.value !== '' ? parseFloat(el.value) : undefined;
  return el.value || undefined;
}

// ── Proxy rules ──────────────────────────────────────────────────────────

async function renderRules(body) {
  const rules = await (await fetch(API + '/api/proxy/rules')).json();
  let h = '';
  if (rules.length === 0) h += '<div style="color:var(--fg2);margin-bottom:12px">No rules</div>';
  else for (const r of rules) h += `<div class="rule"><input type="checkbox" ${r.enabled ? 'checked' : ''}><span class="rule-pkt">${esc(r.packet)}</span><span class="rule-dir">${r.direction || 'ALL'}</span><span class="rule-action ${r.action}">${r.action.toUpperCase()}</span><button class="rule-del" onclick="deleteProxyRule(${r.id})">\u00d7</button></div>`;
  h += `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
    <b style="font-size:12px">Add Rule</b>
    <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
      <input type="text" id="rulePkt" list="msgNames" placeholder="Packet name" style="flex:1">
      <select id="ruleDir"><option value="">Both</option><option value="C2S">C2S</option><option value="S2C">S2C</option></select>
      <select id="ruleAction"><option value="drop">Drop</option><option value="modify">Modify</option></select>
      <button onclick="addProxyRule()">Add</button>
    </div></div>`;
  body.innerHTML = h;
}

async function addProxyRule() {
  const pkt = document.getElementById('rulePkt').value.trim(); if (!pkt) return;
  await api('POST', '/api/proxy/rules', { packet: pkt, direction: document.getElementById('ruleDir').value || null, action: document.getElementById('ruleAction').value });
  renderDetail();
}
async function deleteProxyRule(id) { await api('DELETE', '/api/proxy/rules/' + id); renderDetail(); }

// ── Log helper ───────────────────────────────────────────────────────────

function appendLogEntry(msg) {
  const body = document.getElementById('detailBody');
  if (!body || currentTab !== 'logs') return;
  const div = document.createElement('div'); div.className = 'log-entry';
  div.innerHTML = `<span class="log-ts">${new Date(msg.ts).toLocaleTimeString()}</span><span class="log-msg${msg.msg.includes('ERROR') ? ' err' : ''}">${esc(msg.msg)}</span>`;
  body.appendChild(div);
  if (body.scrollHeight - body.scrollTop - body.clientHeight < 60) body.scrollTop = body.scrollHeight;
  while (body.children.length > 500) body.removeChild(body.firstChild);
}

// ── Actions ──────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method };
  if (body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
  return (await fetch(API + path, opts)).json();
}

async function doRegister() {
  const count = Math.min(Math.max(parseInt(document.getElementById('regCount').value) || 1, 1), 20);
  const serverId = document.getElementById('regServer').value.trim() || null;
  const btn = document.getElementById('regBtns').querySelector('.primary');
  const logEl = document.getElementById('regLog');
  btn.disabled = true; btn.textContent = 'Creating...';
  document.getElementById('regProgress').style.display = 'block';
  logEl.innerHTML = '';

  // Listen for register_log websocket events
  const logHandler = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'register_log') {
      const line = document.createElement('div');
      line.textContent = msg.msg;
      if (msg.msg.includes('ERROR')) line.style.color = 'var(--red)';
      else if (msg.msg.includes('Success')) line.style.color = 'var(--green)';
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }
  };
  ws.addEventListener('message', logHandler);

  try {
    const res = await api('POST', '/api/register', { count, serverId });
    const ok = (res.results || []).filter(r => !r.error).length;
    const line = document.createElement('div');
    line.style.fontWeight = '600';
    line.style.color = ok > 0 ? 'var(--green)' : 'var(--red)';
    line.textContent = `Done: ${ok}/${count} accounts created`;
    logEl.appendChild(line);
    fetchStatus();
  } catch (e) {
    const line = document.createElement('div');
    line.style.color = 'var(--red)';
    line.textContent = 'Error: ' + e.message;
    logEl.appendChild(line);
  }

  ws.removeEventListener('message', logHandler);
  btn.disabled = false; btn.textContent = 'Create';
}

// ── Heroes / Formation tab ─────────────────────────────────────────────────

const POST_NAMES = { 1: 'Guardian', 2: 'Support', 3: 'Assassin', 4: 'Warrior', 5: 'Archer', 6: 'Mage' };
const POST_SHORT = { 1: 'GRD', 2: 'SUP', 3: 'ASN', 4: 'WAR', 5: 'ARC', 6: 'MAG' };
// Grid: row 0 = front (pos 1,2,3), row 1 = mid (4,5,6), row 2 = back (7,8,9)
const ROW_LABELS = ['Front', 'Mid', 'Back'];

let heroTabData = null;
let heroTabLoading = false;

async function loadHeroData(accountId) {
  heroTabLoading = true;
  try {
    const resp = await fetch(API + `/api/accounts/${accountId}/heroes`);

function renderHeroesTab(body, a) {
  if (!heroTabData || heroTabData.error) {
    body.innerHTML = `<div style="padding:16px;color:var(--fg2)">${heroTabLoading ? 'Loading...' : 'Loading hero data...'}</div>`;
    if (!heroTabLoading) {
      loadHeroData(a.id).then(() => { if (currentTab === 'heroes') renderHeroesTab(body, a); });
    }
    return;
  }
  const d = heroTabData;
  const heroes = d.heroes || [];
  const lineup = d.teamLineup || [];
  const enemies = d.enemies;
  const costs = d.levelCosts || [];
  const costMap = {};
  for (const c of costs) costMap[c.heroId] = c;

  // Currency bar
  const gold = d.currencies?.[3] || 0;
  const ess = d.currencies?.[5] || 0;
  const wyrm = d.currencies?.[6] || 0;
  const diamonds = d.currencies?.[1] || 0;

  let html = `<div style="padding:12px 16px">
    <div class="currency-bar">
      <span>Gold: <b>${gold.toLocaleString()}</b></span>
      <span>Lum.XP: <b>${ess.toLocaleString()}</b></span>
      <span>Wyrm Ess: <b>${wyrm.toLocaleString()}</b></span>
      <span>Diamonds: <b>${diamonds.toLocaleString()}</b></span>
      <span>Player Lv: <b>${d.playerLevel || '?'}</b></span>
      <button onclick="heroTabData=null;renderHeroesTab(document.getElementById('detailBody'),accounts[selectedId])" style="margin-left:auto;font-size:10px;padding:2px 8px">Refresh</button>
    </div>
    <div class="formation-container">`;

  // Our formation grid
  html += `<div class="formation-panel">
    <h4>Our Formation</h4>
    ${renderFormationGrid(heroes, lineup, false)}
  </div>`;

  // Enemy formation grid (if available)
  if (enemies && enemies.enemies?.length) {
    const dMeta = d.dungeonMeta;
    const stageLabel = dMeta ? `Ch${dMeta.Chapter}-${dMeta.Stage}` : `#${enemies.dungeonId}`;
    html += `<div class="formation-panel">
      <h4>Enemy: ${stageLabel} ${dMeta?.Limit_Level ? '(Lv' + dMeta.Limit_Level + ')' : ''}</h4>
      ${renderEnemyGrid(enemies.enemies)}
    </div>`;
  } else {
    html += `<div class="formation-panel">
      <h4>Enemy Formation</h4>
      <div style="color:var(--fg2);font-size:11px">No enemy data for next dungeon</div>
    </div>`;
  }

  html += `</div>`; // end formation-container

  // Hero roster list
  html += `<div class="hero-roster"><h4 style="font-size:12px;color:var(--accent);margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px">Hero Roster (${heroes.length})</h4>`;

  // Sort: team first, then by FP
  const sorted = [...heroes].sort((a, b) => {
    const aTeam = lineup.includes(a.heroId) ? 0 : 1;
    const bTeam = lineup.includes(b.heroId) ? 0 : 1;
    if (aTeam !== bTeam) return aTeam - bTeam;
    return (b.fightPower || 0) - (a.fightPower || 0);
  });

  for (const h of sorted) {
    const inTeam = lineup.includes(h.heroId);
    const post = h.post || 0;
    const costInfo = costMap[h.heroId];
    let costLabel = '';
    if (costInfo && !costInfo.atMax) {
      const canAfford = costInfo.maxAfford > costInfo.fromLv;
      const maxLvLabel = canAfford ? `→Lv${costInfo.maxAfford}` : `need ${costInfo.nextCost?.gold}g+${costInfo.nextCost?.essence}xp`;
      costLabel = `<span class="hero-cost ${canAfford ? '' : 'cant-afford'}">${maxLvLabel}</span>`;
    } else if (costInfo?.atMax) {
      costLabel = `<span class="hero-cost" style="color:var(--green)">MAX</span>`;
    }

    html += `<div class="hero-row ${inTeam ? 'in-team' : ''}">
      ${post ? `<span class="post-badge post-${post}">${POST_SHORT[post] || '?'}</span>` : ''}

    </div>`;
  }
  html += `</div></div>`;
  body.innerHTML = html;
}

function renderFormationGrid(heroes, lineup, isEnemy) {
  // Build position map from lineup (lineup is just heroId array, we need positions)
  // For now, map lineup indices to grid positions using the team order
  // Position mapping: lineup[0]→pos from account state, or fallback to default positions
  const heroMap = {};
  for (const h of heroes) heroMap[h.heroId] = h;

  // We don't have exact positions stored client-side, so arrange by class rules
  const teamHeroes = lineup.map(id => heroMap[id]).filter(Boolean);
  const posMap = {}; // posId → hero
  const used = new Set();

  // Preferred positions by class
  const PREFERRED = {
    1: [2, 1, 3], 2: [8, 5, 9], 3: [7, 9, 4], 4: [1, 3, 2, 4, 6],
    5: [7, 9, 8], 6: [8, 5, 7, 9],
  };

  // Sort by constraint (fewest valid positions first)
  const VALID = {
    1: [1,2,3], 2: [4,5,6,7,8,9], 3: [1,2,3,4,5,6,7,8,9], 4: [1,2,3,4,5,6],
    5: [4,5,6,7,8,9], 6: [4,5,6,7,8,9],
  };
  const sorted = [...teamHeroes].sort((a, b) => {
    const aV = VALID[a.post || 4]?.length || 9;
    const bV = VALID[b.post || 4]?.length || 9;
    return aV - bV;
  });

  for (const h of sorted) {
    const pref = PREFERRED[h.post || 4] || [5, 2, 8, 1, 3, 4, 6, 7, 9];
    for (const pos of pref) {
      if (!used.has(pos)) { used.add(pos); posMap[pos] = h; break; }
    }
  }

  let html = '';
  for (let row = 0; row < 3; row++) {
    html += `<div class="grid-row-label">${ROW_LABELS[row]}</div><div class="formation-grid">`;
    for (let col = 0; col < 3; col++) {
      const pos = row * 3 + col + 1;
      const h = posMap[pos];
      if (h) {
        const post = h.post || 0;
        html += `<div class="grid-cell occupied">
          <span class="cell-post post-badge post-${post}">${POST_SHORT[post] || '?'}</span>
          <span class="cell-name">${esc(h.name || '#' + h.heroId)}</span>
          <span class="cell-info">Lv${h.level || 1} ${h.fightPower || 0}FP</span>
        </div>`;
      } else {
        html += `<div class="grid-cell"><span class="cell-info">${pos}</span></div>`;
      }
    }
    html += `</div>`;
  }
  return html;
}

function renderEnemyGrid(enemies) {
  // Enemies have slot (1-9) from CopyEnemy.role_id_N — this IS their grid position
  const posMap = {};
  for (const e of enemies) {
    if (e.slot >= 1 && e.slot <= 9) posMap[e.slot] = e;
  }

  let html = '';
  for (let row = 0; row < 3; row++) {
    html += `<div class="grid-row-label">${ROW_LABELS[row]}</div><div class="formation-grid">`;
    for (let col = 0; col < 3; col++) {
      const pos = row * 3 + col + 1;
      const e = posMap[pos];
      if (e) {
        const post = e.post || 0;
        html += `<div class="grid-cell enemy">
          <span class="cell-post post-badge post-${post}">${POST_SHORT[post] || '?'}</span>
          <span class="cell-name">${esc(e.heroName || '#' + e.monsterId)}</span>
          <span class="cell-info">${e.fightScore || 0}FP</span>
        </div>`;
      } else {
        html += `<div class="grid-cell"><span class="cell-info">${pos}</span></div>`;
      }
    }
    html += `</div>`;
  }
  return html;
}

function renderMiningGrid(grids, judgGrids, highlight) {
  const el = document.getElementById('miningGrid');
  if (!el) return;
  const allCells = [...(judgGrids || []), ...(grids || [])];
  if (allCells.length === 0) { el.innerHTML = '<span style="color:var(--fg2)">No grid data</span>'; return; }

  const xs = [...new Set(allCells.map(c => c.x))].sort((a, b) => a - b);
  const minX = xs[0], maxX = xs[xs.length - 1];
  // Show last 8 columns
  const showXs = xs.slice(-8);
  const cellMap = {};
  for (const c of allCells) cellMap[c.x + ',' + c.y] = c;
  const clearedSet = new Set([
    ...(judgGrids || []).map(j => j.x + ',' + j.y),
    ...(grids || []).filter(g => g.clickNum > 0).map(g => g.x + ',' + g.y),
  ]);

  el.style.gridTemplateColumns = `repeat(${showXs.length}, 1fr)`;
  let html = '';
  for (let y = 0; y < 6; y++) {
    for (const x of showXs) {
      const key = x + ',' + y;
      const c = cellMap[key];
      const isHL = highlight && highlight.x === x && highlight.y === y;
      const isCleared = clearedSet.has(key);
      let bg = '#222', text = '', border = '';

      if (isCleared) {
        bg = '#1a1a2a'; text = '·';
      } else if (c) {
        // Reward overlay
        const rid = c.rewardId || 0;
        let rewardIcon = '';
        // Reward IDs ending in 5 = bomb, 6 = rocket (per theme, every 10 IDs)
        // Actually: check mod 10 pattern from AvMiningGridItem
        if (rid > 0) {
          const mod = rid % 10;
          if (mod === 5 || mod === 7) rewardIcon = '💣'; // bomb
          else if (mod === 6 || mod === 8) rewardIcon = '🚀'; // rocket
          else if (mod === 4) rewardIcon = '⭐'; // gold star
          else if (mod === 1 || mod === 2 || mod === 3) rewardIcon = '✦'; // blue stars
          else rewardIcon = '🎁';
        }

        // Type maps to GridType: mod3 → 1=empty/treasure(0), 2=grass(1), 3=rock(2)
        const gridType = c.type <= 9 ? ((c.type - 1) % 3) + 1 : ((c.type % 10 - 1) % 3) + 1;
        if (gridType === 1) { bg = '#1a2a3a'; text = rewardIcon || '⬜'; } // empty/treasure
        else if (gridType === 2) { bg = '#2a3a1a'; text = rewardIcon || '🌿'; } // grass
        else if (gridType === 3) { bg = '#3a2a1a'; text = rewardIcon || '🪨'; } // rock
        else { bg = '#2a2a2a'; text = c.type; }
      } else {
        bg = '#111'; text = '?';
      }

      if (isHL) border = 'border:2px solid var(--yellow);';
      if (x === maxX) border += 'border-right:2px solid var(--cyan);';

      html += '<div style="' + border + 'background:' + bg + ';text-align:center;padding:4px 0;border-radius:3px;min-height:24px">' + text + '</div>';
    }
  }
  el.innerHTML = html;
}

function addMiningLog(msg) {

  el.innerHTML = '<div>' + msg + '</div>' + el.innerHTML;

async function doMainStory(accountId) {
  const btn = document.getElementById('mainStoryBtn');
  const result = document.getElementById('mainStoryResult');
  if (btn) { btn.disabled = true; btn.textContent = 'Fighting...'; }
  if (result) result.textContent = 'Entering dungeon...';
  try {
    const res = await api('POST', `/api/accounts/${accountId}/main-story`);
    if (res.error) {
      if (result) result.textContent = 'Error: ' + res.error;
    } else if (res.win) {
      if (result) result.textContent = `WIN! Dungeon ${res.dungeonId} cleared`;
      result.style.color = 'var(--green)';
    } else {
      if (result) result.textContent = `FAIL: Dungeon ${res.dungeonId} — ${res.error || 'Battle lost'}`;
      result.style.color = 'var(--red)';
    }
  } catch (e) {
    if (result) result.textContent = 'Error: ' + e.message;
  }
  if (btn) { btn.disabled = false; btn.textContent = 'Do Battle'; }
}

async function startAutoPlay(accountId) {
  const res = await api('POST', `/api/accounts/${accountId}/autoplay`, { action: 'start' });
  if (res.error) alert('Error: ' + res.error);
}

async function stopAutoPlay(accountId) {
  const res = await api('POST', `/api/accounts/${accountId}/autoplay`, { action: 'stop' });
  if (res.error) alert('Error: ' + res.error);
}

async function configAutoPlay(accountId, key, value) {
  await api('POST', `/api/accounts/${accountId}/autoplay`, { action: 'configure', settings: { [key]: value } });
}

async function renderProxyTarget(body) {
  body.innerHTML = '<div style="color:var(--fg2)">Loading...</div>';
  try {
    const resp = await fetch(API + '/api/proxy/target');
    if (!resp.ok) { body.innerHTML = '<div style="color:var(--red)">Proxy not running (start bot with --proxy flag)</div>'; return; }
    const data = await resp.json();
    if (data.error) { body.innerHTML = '<div style="color:var(--red)">' + esc(data.error) + '</div>'; return; }
    body.innerHTML = `<div style="padding:4px 0">
      <h3>Proxy Target Server</h3>
      <p style="font-size:11px;color:var(--fg2);margin-bottom:12px">The game server the proxy forwards traffic to. Changes apply to the next client connection.</p>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <input type="text" id="proxyHost" value="${esc(data.host)}" placeholder="Host" style="flex:2">
        <span>:</span>
        <input type="number" id="proxyPort" value="${data.port}" placeholder="Port" style="width:80px">
        <button onclick="setProxyTarget()">Apply</button>
      </div>
      <div id="proxyTargetResult"></div>
      <h3 style="margin-top:16px">Quick Switch (from account server list)</h3>
      <p style="font-size:11px;color:var(--fg2);margin-bottom:8px">Pick a server from any logged-in account's server list.</p>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <select id="proxyAcctSelect" onchange="loadProxyServerList()" style="flex:1;background:var(--bg1);color:var(--fg);border:1px solid var(--bg2)">
          <option value="">Select account...</option>
          ${Object.values(accounts).filter(a => a.state === 'online' || a.serverId).map(a =>
            '<option value="' + a.id + '">' + esc(a.email.split('@')[0]) + '</option>'
          ).join('')}
        </select>
      </div>
      <div id="proxyServerList"></div>
    </div>`;
  } catch (e) { body.innerHTML = '<div style="color:var(--red)">' + esc(e.message) + '</div>'; }
}

async function setProxyTarget() {
  const host = document.getElementById('proxyHost').value.trim();
  const port = parseInt(document.getElementById('proxyPort').value);
  const res = await api('POST', '/api/proxy/target', { host, port });
  const el = document.getElementById('proxyTargetResult');
  if (el) el.innerHTML = res.error ? '<span style="color:var(--red)">' + esc(res.error) + '</span>' : '<span style="color:var(--green)">Target set to ' + esc(host) + ':' + port + '</span>';
}

async function loadProxyServerList() {
  const acctId = document.getElementById('proxyAcctSelect')?.value;
  const el = document.getElementById('proxyServerList');
  if (!acctId || !el) return;
  el.innerHTML = '<div style="color:var(--fg2)">Loading...</div>';
  try {
    const data = await (await fetch(API + '/api/accounts/' + acctId + '/servers')).json();
    if (data.error) { el.innerHTML = '<span style="color:var(--red)">' + esc(data.error) + '</span>'; return; }
    let h = '<select id="proxyServerSelect" style="width:100%;margin-bottom:8px;background:var(--bg1);color:var(--fg);border:1px solid var(--bg2)">';
    for (const s of data.servers) {
      const sel = s.serverId === data.current ? ' selected' : '';
      const role = s.hasRole ? ' \u2605' : '';
      h += '<option value="' + esc(s.serverId) + '">' + esc(s.name) + role + ' (' + esc(s.serverId) + ')</option>';
    }
    h += '</select><button onclick="applyProxyServer()">Set as Proxy Target</button>';
    el.innerHTML = h;
    // Store server data for lookup
    el._servers = data.servers;
  } catch (e) { el.innerHTML = '<span style="color:var(--red)">' + esc(e.message) + '</span>'; }
}

async function applyProxyServer() {
  const sel = document.getElementById('proxyServerSelect');
  const el = document.getElementById('proxyServerList');
  if (!sel || !el?._servers) return;
  const sid = sel.value;
  // We need the IP/port. The server list from getAllServers includes ip/port in the account's loginData.
  // But the /servers endpoint doesn't expose ip/port. Let me use a different approach — set serverId and let proxy resolve.
  // Actually, the server list from game-tree includes ip/port. Let me add that to the API response.
  // For now, show the serverId
  const res = await api('POST', '/api/proxy/target-server', { accountId: parseInt(document.getElementById('proxyAcctSelect').value), serverId: sid });
  const result = document.getElementById('proxyTargetResult');
  if (result) result.innerHTML = res.error ? '<span style="color:var(--red)">' + esc(res.error) + '</span>' : '<span style="color:var(--green)">Target set to ' + esc(res.host) + ':' + res.port + '</span>';
}

async function showServerPicker(accountId) {
  const el = document.getElementById('serverPicker');
  if (!el) return;
  el.innerHTML = '<div style="padding:8px;color:var(--fg2)">Loading servers...</div>';
  try {
    const data = await (await fetch(API + '/api/accounts/' + accountId + '/servers')).json();
    if (data.error) { el.innerHTML = '<div style="color:var(--red)">Error: ' + esc(data.error) + '</div>'; return; }
    let h = '<div style="margin-top:12px"><h3 style="margin-bottom:8px">Change Server</h3>';
    h += '<select id="serverSelect" style="width:100%;padding:4px;margin-bottom:8px;background:var(--bg1);color:var(--fg);border:1px solid var(--bg2)">';
    let lastGroup = '';
    for (const s of data.servers) {
      if (s.groupName !== lastGroup) { if (lastGroup) h += '</optgroup>'; h += '<optgroup label="' + esc(s.groupName) + '">'; lastGroup = s.groupName; }
      const sel = s.serverId === data.current ? ' selected' : '';
      const role = s.hasRole ? ' \u2605' : '';
      h += '<option value="' + esc(s.serverId) + '"' + sel + '>' + esc(s.name) + role + ' (' + esc(s.serverId) + ')</option>';
    }
    if (lastGroup) h += '</optgroup>';
    h += '</select>';
    h += '<div style="display:flex;gap:8px"><button onclick="changeServer(' + accountId + ')">Apply & Reconnect</button>';
    h += '<button onclick="document.getElementById(\'serverPicker\').innerHTML=\'\'">Cancel</button></div></div>';
    el.innerHTML = h;
  } catch (e) { el.innerHTML = '<div style="color:var(--red)">Failed: ' + esc(e.message) + '</div>'; }
}

async function changeServer(accountId) {
  const sel = document.getElementById('serverSelect');
  if (!sel) return;
  const serverId = sel.value;
  await api('POST', '/api/accounts/' + accountId + '/server', { serverId });
  // Reconnect with new server
  await api('POST', '/api/accounts/' + accountId + '/start');
  document.getElementById('serverPicker').innerHTML = '<div style="padding:8px;color:var(--green)">Reconnecting to ' + esc(serverId) + '...</div>';
}

function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function formatUptime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}
</script>
</body>
