message AccessoryData {
  optional int32 id = 1;
  optional int32 haveNum = 2;
  optional int64 getTime = 3;
  optional int32 frameExp = 4;
  optional int32 frameLv = 5;
}

message ActiveAwardStatus {
  optional int32 activeId = 1;
  optional int32 activeStatus = 2;
}

message ActiveTaskBean {
  optional int32 taskType = 1;
  optional int64 remainTime = 2;
  optional int32 activeNum = 3;
  repeated ActiveAwardStatus activeStatus = 4;
  repeated ActiveTaskStatus taskStatus = 5;
  optional int32 allTaskAwardStatus = 6;
}

message ActiveTaskStatus {
  optional int32 taskId = 1;
  optional int32 taskStatus = 2;
  optional int32 times = 3;
}

message AlbumFighterInfo {
  optional int32 fighterTid = 1;
  optional int32 starLv = 2;
  optional int32 maxStarLv = 3;
  optional int32 awakeLevel = 4;
}

message AlbumInfo {
  repeated AlbumFighterInfo fighter = 1;
  optional double totalScore = 2;
}

message ApplyOrBlackFriendInfoMsg {
  optional PlayerBaseInfo baseInfo = 1;
  optional int64 time = 2;
}

message ArenaBattleReplayMsg {
  optional bool result = 1;
  optional bytes input = 2;
}

message ArenaBattleReportMsg {
  optional int64 id = 1;
  optional bool isAttack = 2;
  optional bool isWin = 3;
  optional int64 replayId = 4;
  optional int64 fightTime = 5;
  optional ArenaBattleReportPlayerMsg slfSider = 6;
  optional ArenaBattleReportPlayerMsg otherSider = 7;
  optional int32 rankChange = 8;
  optional int32 battleVersion = 9;
}

message ArenaBattleReportPlayerMsg {
  optional string rid = 1;
  optional int32 headIcon = 2;
  optional int32 iconFrame = 3;
  optional string name = 4;
  optional int32 title = 5;
}

message ArenaChallengeTimesMsg {
  optional int32 remainChallengeTimes = 1;
  optional int32 buyTimes = 2;
}

message ArenaFightResultMsg {
  repeated ArenaBattleReplayMsg replay = 1;
  optional int32 changedRank = 2;
  optional int32 nowRank = 3;
  optional ArenaPlayerMsg arenaPlayer = 4;
  repeated ItemInfo rewards = 5;
}

message ArenaKingPlayerBaseInfo {
  optional string rid = 1;
  optional string name = 2;
  optional int32 level = 3;
  optional int32 icon = 4;
  optional int32 iconFrame = 5;
  optional int32 title = 6;
  optional int32 fightScore = 7;
  optional string server = 8;
  optional string serverName = 9;
  optional int32 score = 10;
  optional string guildName = 11;
  optional bool robot = 12;
  optional int32 rank = 13;
  optional int32 winTimes = 14;
  optional int32 loseTimes = 15;
}

message ArenaKingRoundInfo {
  optional int32 roundId = 1;
  optional int32 roundState = 2;
  optional bool isWin = 3;
  optional int64 replayId = 4;
  repeated FighterInfo attackFighter = 5;
  repeated FighterInfo rivalFighter = 6;
  optional int32 boxState = 7;
  optional ArenaKingPlayerBaseInfo attackBaseInfo = 8;
  optional ArenaKingPlayerBaseInfo rivalBaseInfo = 9;
  optional int32 attackAddScore = 10;
  optional int32 rivalAddScore = 11;
  optional int32 battleVersion = 12;
  optional int32 attackCurScore = 13;
  optional int32 rivalCurScore = 14;
}

message ArenaKingSeasonRankParam {
  optional int32 battleTimes = 1;
  optional int32 winTimes = 2;
  optional int32 score = 3;
  optional int32 rank = 4;
}

message ArenaKingStageRoundMsg {
  optional int32 stage = 1;
  repeated ArenaKingRoundInfo rounds = 2;
}

message ArenaLoginMsg {
  repeated int32 exchageRewards = 1;
  optional int32 remainChallengeTimes = 2;
}

message ArenaMsg {
  repeated ArenaPlayerMsg rivals = 1;
  optional ArenaChallengeTimesMsg challengeTimes = 2;
  optional int32 refreshCd = 3;
  optional bool passGuide = 4;
  optional int32 rank = 5;
  optional int32 historyMaxRank = 6;
  optional int32 gachaRewardScore = 7;
  repeated int32 exchangeRewards = 8;
}

message ArenaPlayerMsg {
  optional int32 type = 1;
  optional string rid = 2;
  optional int32 headIcon = 3;
  optional int32 iconFrame = 4;
  optional string name = 5;
  optional string level = 6;
  optional int64 fight = 7;
  optional int32 rank = 8;
  optional int32 curTitle = 9;
}

message AttrDetail {
  optional int32 fighterTid = 1;
  repeated SkillItemMsg skills = 2;
  repeated KeyValuePairDouble attrs = 3;
}

message AuctionInfo {
  optional int32 auctionId = 1;
  optional int32 baseMoneyType = 2;
  optional int32 basemoneyNum = 3;
  optional int32 auctionMoneyNum = 4;
  optional int32 remainMillSec = 5;
  optional int32 bonus = 6;
}

message AuctionItemInfo {
  optional int64 itemUid = 1;
  optional int32 itemTid = 2;
  optional int32 form = 3;
  optional int32 auctionTimes = 4;
  optional string curPlayer = 5;
}

message AuctionItemMsg {
  optional int32 auctionId = 1;
  optional int32 auctionItemId = 2;
  optional int32 auctionItemNum = 3;
}

message AuctionRecordInfo {
  optional int64 itemUid = 1;
  optional int32 itemTid = 2;
  optional bool onePrice = 3;
  optional bool success = 4;
  optional int32 price = 5;
  optional int64 time = 6;
  optional int32 from = 7;
}

message AuctionResult {
  optional int32 auctionStatus = 1;
  optional int32 auctionItemId = 2;
  optional int32 auctionItemNum = 3;
  optional int32 moneyType = 4;
  optional int32 moneyNum = 5;
  optional int64 auctionPlayerId = 6;
  optional int32 bonus = 7;
}

message AvBattlePassInfo {
  optional int32 activityId = 1;
  optional int32 exp = 2;
  repeated int32 claimedBasic = 3;
  repeated int32 claimedUpgrade = 4;
  optional bool paid = 5;
  optional double multiplier = 6;
}

message AvBriefInfo {
  optional int32 activityId = 1;
  optional int32 p1 = 2;
  optional int32 p2 = 3;
